# Heartbeat: Build trigger for auth fix validation
name: Build and Distribute App

on:
  push:
    branches: [ main ]

jobs:
  build_android:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'zulu'

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Build Web App
        run: npm run build
        env:
          VITE_FIREBASE_API_KEY: ${{ secrets.FIREBASE_API_KEY }}
          VITE_FIREBASE_AUTH_DOMAIN: ${{ secrets.FIREBASE_AUTH_DOMAIN }}
          VITE_FIREBASE_PROJECT_ID: ${{ secrets.FIREBASE_PROJECT_ID }}

      - name: Capacitor Sync
        run: npx cap sync android

      - name: Build Android APK
        run: |
          chmod +x android/gradlew
          cd android
          ./gradlew assembleDebug

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: spotifyunlocked-debug-${{ github.run_number }}
          path: android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 7

      - name: 🔥 Firebase Auth Diagnostic
        run: |
          echo "Checking secret availability and lengths (Masked)..."
          if [ -n "${{ secrets.FIREBASE_TOKEN }}" ]; then
            echo "✅ FIREBASE_TOKEN: Detected (Length: ${#FIREBASE_TOKEN})"
          else
            echo "❌ FIREBASE_TOKEN: NOT FOUND"
          fi
          
          if [ -n "${{ secrets.FIREBASE_SERVICE_ACCOUNT }}" ]; then
            echo "✅ SERVICE_ACCOUNT: Detected (Length: ${#FIREBASE_SERVICE_ACCOUNT})"
          else
            echo "❌ SERVICE_ACCOUNT: NOT FOUND"
          fi

      - name: 🚀 Distribute to Firebase
        env:
          APP_ID: ${{ secrets.FIREBASE_ANDROID_APP_ID }}
          FB_TOKEN: ${{ secrets.FIREBASE_TOKEN }}
          SA_JSON: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
        run: |
          # Write SA JSON to file for CLI to use
          echo "$SA_JSON" > sa.json
          
          if [ -n "$FB_TOKEN" ]; then
            echo "🔐 Attempting distribution via TOKEN..."
            npx firebase-tools appdistribution:distribute android/app/build/outputs/apk/debug/app-debug.apk \
              --app "$APP_ID" \
              --token "$FB_TOKEN" \
              --groups "testers" \
              --non-interactive
          else
            echo "🔑 Attempting distribution via SERVICE ACCOUNT..."
            GOOGLE_APPLICATION_CREDENTIALS=sa.json npx firebase-tools appdistribution:distribute android/app/build/outputs/apk/debug/app-debug.apk \
              --app "$APP_ID" \
              --groups "testers" \
              --non-interactive
          fi

  notify:
    runs-on: ubuntu-latest
    needs: build_android
    if: always()
    steps:
      - name: Notify Alexa
        run: |
          if [ "${{ needs.build_android.result }}" = "success" ]; then
            MSG="✅ Spotify Unlocked: The crate is full. Build success."
          else
            MSG="❌ Spotify Unlocked: The crate is empty. Build failed. Check GitHub Actions."
          fi
          curl -s -X POST "https://api.notifymyecho.com/v1/NotifyMe" \
          -H "Content-Type: application/json" \
          -d "{\"notification\": \"$MSG\", \"accessCode\": \"${{ secrets.ALEXA_NOTIFY_ME_TOKEN }}\"}"
