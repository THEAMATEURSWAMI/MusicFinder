# Heartbeat: Verifying new FIREBASE_TOKEN fix
name: Build and Distribute App

on:
  push:
    branches: [ main ]

jobs:
  build_android:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'zulu'

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: Install dependencies
        working-directory: ./spotify_unlocked
        run: |
          flutter config --no-analytics
          flutter pub get

      - name: Build Android APK
        working-directory: ./spotify_unlocked
        run: flutter build apk --release

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: spotifyunlocked-release-${{ github.run_number }}
          path: spotify_unlocked/build/app/outputs/flutter-apk/app-release.apk
          retention-days: 7

      - name: 🔥 Firebase Auth Diagnostic
        run: |
          echo "Checking secret availability and lengths (Masked)..."
          if [ -n "${{ secrets.FIREBASE_TOKEN }}" ]; then
            echo "✅ FIREBASE_TOKEN: Detected (Length: ${#FIREBASE_TOKEN})"
          else
            echo "❌ FIREBASE_TOKEN: NOT FOUND"
          fi
          
          if [ -n "${{ secrets.FIREBASE_SERVICE_ACCOUNT }}" ]; then
            echo "✅ SERVICE_ACCOUNT: Detected (Length: ${#FIREBASE_SERVICE_ACCOUNT})"
          else
            echo "❌ SERVICE_ACCOUNT: NOT FOUND"
          fi

      - name: 🚀 Distribute to Firebase
        env:
          APP_ID: ${{ secrets.FIREBASE_ANDROID_APP_ID }}
          FB_TOKEN: ${{ secrets.FIREBASE_TOKEN }}
          SA_JSON: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
        run: |
          # Verify APK exists
          if [ ! -f spotify_unlocked/build/app/outputs/flutter-apk/app-release.apk ]; then
            echo "❌ ERROR: APK not found at the expected path!"
            exit 1
          fi

          # Write SA JSON to disk
          echo "$SA_JSON" > sa.json

          # Need node for firebase-tools
          npm install -g firebase-tools

          if [ -n "$FB_TOKEN" ]; then
            echo "🔐 [TOKEN PATH] FB_TOKEN detected. Distributing..."
            firebase appdistribution:distribute spotify_unlocked/build/app/outputs/flutter-apk/app-release.apk \
              --app "$APP_ID" \
              --token "$FB_TOKEN" \
              --groups "testers" \
              --non-interactive
          else
            echo "🔑 [FALLBACK PATH] FB_TOKEN missing. Trying Service Account..."
            if [ ! -s sa.json ]; then echo "❌ SA_JSON is empty!"; exit 1; fi
            export GOOGLE_APPLICATION_CREDENTIALS=$(pwd)/sa.json
            firebase appdistribution:distribute spotify_unlocked/build/app/outputs/flutter-apk/app-release.apk \
              --app "$APP_ID" \
              --groups "testers" \
              --non-interactive
          fi

  notify:
    runs-on: ubuntu-latest
    needs: build_android
    if: always()
    steps:
      - name: Notify Alexa
        run: |
          if [ "${{ needs.build_android.result }}" = "success" ]; then
            MSG="✅ Spotify Unlocked: The crate is full. Build success."
          else
            MSG="❌ Spotify Unlocked: The crate is empty. Build failed. Check GitHub Actions."
          fi
          curl -s -X POST "https://api.notifymyecho.com/v1/NotifyMe" \
          -H "Content-Type: application/json" \
          -d "{\"notification\": \"$MSG\", \"accessCode\": \"${{ secrets.ALEXA_NOTIFY_ME_TOKEN }}\"}"
